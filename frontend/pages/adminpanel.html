<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administrador | ControlTask</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body data-role="admin" data-page="adminpanel">

    <main id="page-content">

        <div class="flex flex-wrap justify-between items-center gap-4 mb-8 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div>
                <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Matriz de Reportes Históricos</h2>
                <p class="text-sm text-slate-500 mt-1">Consulta y gestiona los estados contables por año fiscal.</p>
            </div>
    
            <div class="flex items-center gap-4">
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                    <input type="text" placeholder="Buscar empresa o palabra..." class="pl-10 pr-4 py-2 w-64 rounded-full border border-slate-300 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
    
                <button class="btn btn-outline w-10 h-10 rounded-full p-0 flex justify-center items-center" title="Filtrar por fecha">
                    <i class="fas fa-calendar-alt text-indigo-600"></i>
                </button>
    
                <button id="btnOpenWizard" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Status de Reportes
                </button>
            </div>
        </div>

            <!--hay que corregir esto por un script de año mas reciente en la tabla y no una fija-->
        <div id="tables-container">
            
        </div>

       
        <!-- aqui es el nav bar de paginacion -->
        <nav id="pagination-container" aria-label="Paginación" class="flex justify-center mt-8 mb-4">
            <ul class="flex items-center gap-2" id="pagination-list">
                </ul>
        </nav> 


    </main>
    <!--este es el wizzard es para agregar nuevo status de reporte-->
    <div id="wizardModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="color: var(--primary-blue);"><i class="fas fa-tasks"></i> Gestión de Reporte</h3>
                <button id="btnCloseWizard" class="close-btn"><i class="fas fa-times"></i></button>
            </div>
            
            <form id="wizardForm">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                    <div>
                        <label style="font-weight: 600; font-size: 13px;">Año</label>
                        <select id="selectYear" required>
                            <option value="2026">2026</option>
                            <option value="2025">2025</option>
                            <option value="2024">2024</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-weight: 600; font-size: 13px;">Mes</label>
                        <select id="selectMonth" required>
                            <option value="Enero">Enero</option>
                            <option value="Febrero">Febrero</option>
                        </select>
                    </div>
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="font-weight: 600; font-size: 13px;">Empresa</label>
                    <select id="selectCompany" required>
                        <option value="" disabled selected>Seleccione la empresa...</option>
                        <option value="Empresa A">Empresa A</option>
                        <option value="Empresa B">Empresa B</option>
                    </select>
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="font-weight: 600; font-size: 13px;">Proceso</label>
                    <select id="selectProcess" required>
                        <option value="" disabled selected>Seleccione el proceso...</option>
                        <option value="DYP">DYP</option>
                        <option value="DIOT">DIOT</option>
                        <option value="Contabilidad Electronica">Contabilidad Electrónica</option>
                    </select>
                </div>

                <button type="submit" id="btnSubmitWizard" class="btn btn-primary" style="width: 100%;">
                    Siguiente <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div id="wizardLoader" class="loader-container">
                <div class="spinner"></div>
                <p style="color: var(--text-muted); font-weight: 600;">Consultando estado en el servidor...</p>
            </div>

            <div id="dynamicArea" class="dynamic-area"></div>
        </div>
    </div>

        
<script type="module">
    // 1. Importamos tu excelente sistema de notificaciones
    import { showNotification } from '../js/noti.js';

    // 2. Elementos del DOM
    const modal = document.getElementById('wizardModal');
    const btnOpen = document.getElementById('btnOpenWizard');
    const btnClose = document.getElementById('btnCloseWizard');
    const form = document.getElementById('wizardForm');
    const loader = document.getElementById('wizardLoader');
    const dynamicArea = document.getElementById('dynamicArea');
    const btnSubmit = document.getElementById('btnSubmitWizard');

    // 3. Función para limpiar el modal cada vez que se abre
    function resetModal() {
        form.style.display = 'block';
        loader.style.display = 'none';
        dynamicArea.style.display = 'none';
        dynamicArea.innerHTML = ''; 
        btnSubmit.style.display = 'block';
        form.reset(); 
    }

    // 4. Eventos de abrir y cerrar
    if(btnOpen) {
        btnOpen.addEventListener('click', () => {
            modal.classList.remove('hidden');
            resetModal();
        });
    }

    if(btnClose) {
        btnClose.addEventListener('click', () => {
            modal.classList.add('hidden');
        });
    }

    modal.addEventListener('click', (event) => {
        if (event.target === modal) {
            modal.classList.add('hidden');
        }
    });

    // 5. Lógica principal al hacer clic en "Siguiente"
    form.addEventListener('submit', async (e) => {
        e.preventDefault(); 
        
        // Ocultamos el formulario y mostramos el loader
        form.style.display = 'none';
        loader.style.display = 'block';
        
        // Simulación de consulta al servidor (1 segundo)
        setTimeout(() => {
            loader.style.display = 'none';
            dynamicArea.style.display = 'block';
            
            // Inyectamos el área para subir el archivo Y EL BOTÓN FINAL (oculto al inicio)
            dynamicArea.innerHTML = `
                <div style="background: rgba(79, 70, 229, 0.1); padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; color: var(--primary-blue);">
                    <i class="fas fa-info-circle"></i> Sube el archivo PDF correspondiente al periodo seleccionado.
                </div>

                <label style="font-weight: 600; font-size: 13px;">Subir Reporte (PDF):</label>
                
                <div class="file-drop-area" id="dropArea">
                    <i class="fas fa-cloud-upload-alt text-3xl text-indigo-500 mb-2"></i>
                    <p style="color: var(--text-muted); font-size: 13px;" id="fileNameText">Haz clic para seleccionar tu archivo</p>
                    <input type="file" id="fileInput" accept=".pdf" class="hidden">
                </div>

                <button id="btnFinalUpload" class="btn btn-primary" style="width: 100%; margin-top: 15px; display: none;">
                    <i class="fas fa-upload"></i> Guardar Reporte
                </button>
            `;

            // Capturamos los nuevos elementos que acabamos de crear
            const dropArea = document.getElementById('dropArea');
            const fileInput = document.getElementById('fileInput');
            const fileNameText = document.getElementById('fileNameText');
            const btnFinalUpload = document.getElementById('btnFinalUpload');

            // Abrir el selector de archivos al hacer clic en el recuadro
            dropArea.addEventListener('click', () => fileInput.click());

            // Detectar cuando el usuario elige un archivo
            fileInput.addEventListener('change', (event) => {
                const file = event.target.files[0];
                
                if (file && file.type === "application/pdf") {
                    // Es un PDF válido: Mostrar el nombre y habilitar el botón
                    fileNameText.textContent = file.name;
                    fileNameText.style.color = "var(--success-green)";
                    fileNameText.style.fontWeight = "bold";
                    
                    btnFinalUpload.style.display = 'block'; // ¡Aparece el botón!
                } else {
                    // No es un PDF: Usamos tu noti.js para mostrar error
                    showNotification("Por favor, selecciona un archivo PDF válido.", "error");
                    fileInput.value = ""; 
                    fileNameText.textContent = "Haz clic para seleccionar tu archivo";
                    fileNameText.style.color = "var(--text-muted)";
                    fileNameText.style.fontWeight = "normal";
                    
                    btnFinalUpload.style.display = 'none'; // Ocultamos el botón
                }
            });

            // Detectar el clic final para subir el archivo a la base de datos
            btnFinalUpload.addEventListener('click', () => {
                // Cambiamos el texto del botón para que se vea que está cargando
                btnFinalUpload.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Subiendo...';
                btnFinalUpload.style.opacity = '0.7';
                btnFinalUpload.style.pointerEvents = 'none';

                // Simulación de subida (1.5 segundos)
                setTimeout(() => {
                    // Usamos tu noti.js para el éxito
                    showNotification('¡Reporte guardado correctamente!', 'success');
                    
                    // Cerramos el modal
                    modal.classList.add('hidden'); 
                }, 1500);
            });

        }, 1000); // 1 segundo de espera del loader inicial
    });
</script>
<!--script de renderizado de la tabla del dashboard-->
<script>
    // ==========================================
    // FASE 1: MOTOR DE RENDERIZADO DINÁMICO
    // ==========================================

    // 1. Simulamos lo que te mandaría tu Base de Datos (API)
    // Nota: Si eres usuario, la API solo te mandaría esto. Si eres Admin, te mandaría de todas las empresas.
    const tablasPorPagina = 3; // Cuántos años queremos ver por página
    let paginaActual = 1;

    // 1. Datos simulados AMPLIADOS para probar la paginación (5 años)
    const mockDataFromAPI = [
        { company: "Empresa A", year: 2026, month: "Enero", process: "DYP", status: "Terminado", file_url: "link.pdf" },
        { company: "Empresa B", year: 2025, month: "Marzo", process: "ISN", status: "En Proceso", file_url: "" },
        { company: "Empresa A", year: 2024, month: "Febrero", process: "DIOT", status: "Terminado", file_url: "link.pdf" },
        { company: "Empresa B", year: 2023, month: "Abril", process: "IMSS", status: "Terminado", file_url: "link.pdf" },
        { company: "Empresa A", year: 2022, month: "Enero", process: "DYP", status: "Terminado", file_url: "link.pdf" }
    ];

    // 2. Configuración de las columnas
    const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
    const procesos = ['DYP', 'DIOT', 'CONT. ELEC.', 'ISN', 'IMSS'];

    function renderizarTablas(datos) {
        const container = document.getElementById('tables-container');
        container.innerHTML = ''; // Limpiamos si había algo viejo

        // A. Descubrimos qué años y qué empresas existen en los datos que llegaron
        const añosUnicos = [...new Set(datos.map(d => d.year))].sort((a, b) => b - a); // Ordena del más nuevo al más viejo
        const empresasUnicas = [...new Set(datos.map(d => d.company))].sort(); // Alfabético

        if(añosUnicos.length === 0) {
            container.innerHTML = '<p class="text-center text-slate-500 py-10">No hay reportes registrados aún.</p>';
            return;
        }

        // B. Por cada año, creamos una tabla entera
        añosUnicos.forEach(año => {
            
            // Creamos el contenedor y el título del año
            const wrapper = document.createElement('div');
            wrapper.className = "mb-10 table-year-section"; // Esta clase nos servirá para la paginación luego
            
            wrapper.innerHTML = `
                <div class="mb-4 flex justify-between items-center">
                    <h3 class="text-lg font-bold text-slate-800">Estado de Reportes Contables ${año}</h3>
                </div>
            `;

            // C. Construimos las cabeceras (Thead)
            let thead1 = `<tr><th rowspan="2" class="text-left font-bold text-slate-700 uppercase tracking-wider p-4 sticky left-0 bg-slate-50 z-10 border-r border-slate-200 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]">EMPRESA</th>`;
            let thead2 = `<tr class="text-xs uppercase text-slate-500 font-semibold bg-white">`;

            meses.forEach(mes => {
                thead1 += `<th colspan="5" class="border-l border-slate-300 p-2 font-bold text-slate-600 text-center">${mes}</th>`;
                procesos.forEach(proc => {
                    const extraBorder = proc === 'DYP' ? 'border-l border-slate-300' : '';
                    thead2 += `<th class="${extraBorder} p-2">${proc}</th>`;
                });
            });

            thead1 += `</tr>`;
            thead2 += `</tr>`;

            // D. Construimos el cuerpo (Tbody) cruzando la información
            let tbody = `<tbody>`;

            empresasUnicas.forEach(empresa => {
                tbody += `<tr class="hover:bg-slate-50 transition-colors border-b border-slate-100">
                    <td class="text-left font-semibold text-slate-800 p-4 sticky left-0 bg-white z-10 border-r border-slate-200 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] group-hover:bg-slate-50">${empresa}</td>`;

                meses.forEach(mes => {
                    procesos.forEach(proc => {
                        // Magia: Buscamos si existe un registro para esta celda exacta
                        const registro = datos.find(d => d.company === empresa && d.year === año && d.month === mes && d.process === proc);
                        
                        const status = registro ? registro.status : "No iniciado";
                        const fileUrl = registro ? registro.file_url : "";

                        // Colorcitos dinámicos
                        let badgeClass = "badge-neutral";
                        if(status === "Terminado") badgeClass = "badge-success";
                        if(status === "En Proceso") badgeClass = "badge-warning";

                        const extraBorder = proc === 'DYP' ? 'border-l border-slate-200' : '';

                        // Evento clic: Llama a una función global mandando los datos
                        tbody += `<td class="${extraBorder} p-3 text-center">
                                    <span class="badge ${badgeClass} cursor-pointer hover:opacity-80 transition-opacity whitespace-nowrap"
                                          onclick="handleBadgeClick('${empresa}', ${año}, '${mes}', '${proc}', '${status}', '${fileUrl}')">
                                        ${status}
                                    </span>
                                  </td>`;
                    });
                });
                tbody += `</tr>`;
            });

            tbody += `</tbody>`;

            // Juntamos todo y lo inyectamos
            const tableHTML = `
                <div class="table-container overflow-x-auto shadow-sm rounded-xl border border-slate-200 bg-white">
                    <table class="min-w-max w-full text-sm text-center border-collapse">
                        <thead class="bg-slate-50 border-b border-slate-200">${thead1}${thead2}</thead>
                        ${tbody}
                    </table>
                </div>
            `;
            
            wrapper.innerHTML += tableHTML;
            container.appendChild(wrapper);
        });

        aplicarPaginacion(); // ¡AGREGAR ESTA LÍNEA!
    }


    // 2. FUNCIÓN PARA DIVIDIR LAS TABLAS
    function aplicarPaginacion() {
        const secciones = document.querySelectorAll('.table-year-section');
        const totalPaginas = Math.ceil(secciones.length / tablasPorPagina);
        const navPaginacion = document.getElementById('pagination-container');

        // Si hay 1 página o ninguna, ocultamos los botones
        if (totalPaginas <= 1) {
            if(navPaginacion) navPaginacion.style.display = 'none';
        } else {
            if(navPaginacion) navPaginacion.style.display = 'flex';
        }

        // Matemáticas simples para saber qué tablas mostrar
        const inicio = (paginaActual - 1) * tablasPorPagina;
        const fin = inicio + tablasPorPagina;

        // Recorremos las tablas y ocultamos las que no tocan
        secciones.forEach((seccion, index) => {
            if (index >= inicio && index < fin) {
                seccion.style.display = 'block';
                // Añadimos una pequeña animación para que no aparezcan de golpe
                seccion.classList.add('animate-fade-in'); 
            } else {
                seccion.style.display = 'none';
            }
        });

        renderizarControlesPaginacion(totalPaginas);
    }

    // 3. FUNCIÓN PARA DIBUJAR LOS BOTONES (1, 2, 3, Anterior, Siguiente)
    function renderizarControlesPaginacion(totalPaginas) {
        const lista = document.getElementById('pagination-list');
        if (!lista) return;
        lista.innerHTML = '';

        // --- BOTÓN ANTERIOR ---
        const btnPrev = document.createElement('li');
        const disabledPrev = paginaActual === 1 ? 'opacity-50 cursor-not-allowed pointer-events-none' : 'hover:bg-slate-50 hover:text-indigo-600 transition';
        btnPrev.innerHTML = `
            <a class="flex items-center justify-center w-10 h-10 rounded-lg border border-slate-300 bg-white text-slate-500 ${disabledPrev} shadow-sm" href="#" title="Anterior">
                <i class="fas fa-chevron-left text-sm"></i>
            </a>
        `;
        btnPrev.addEventListener('click', (e) => {
            e.preventDefault();
            if (paginaActual > 1) {
                paginaActual--;
                aplicarPaginacion();
                window.scrollTo({ top: 0, behavior: 'smooth' }); // Subir al cambiar de página
            }
        });
        lista.appendChild(btnPrev);

        // --- BOTONES DE NÚMEROS ---
        for (let i = 1; i <= totalPaginas; i++) {
            const li = document.createElement('li');
            if (i === paginaActual) {
                // Página Activa (Azul)
                li.innerHTML = `<a href="#" class="flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold shadow-md transition hover:bg-indigo-700">${i}</a>`;
                li.addEventListener('click', (e) => e.preventDefault()); // Evitar salto
            } else {
                // Página Inactiva (Blanca)
                li.innerHTML = `<a href="#" class="flex items-center justify-center w-10 h-10 rounded-lg border border-slate-300 bg-white text-slate-600 hover:bg-slate-50 transition shadow-sm">${i}</a>`;
                li.addEventListener('click', (e) => {
                    e.preventDefault();
                    paginaActual = i;
                    aplicarPaginacion();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            }
            lista.appendChild(li);
        }

        // --- BOTÓN SIGUIENTE ---
        const btnNext = document.createElement('li');
        const disabledNext = paginaActual === totalPaginas ? 'opacity-50 cursor-not-allowed pointer-events-none' : 'hover:bg-slate-50 hover:text-indigo-600 transition';
        btnNext.innerHTML = `
            <a class="flex items-center justify-center w-10 h-10 rounded-lg border border-slate-300 bg-white text-slate-500 ${disabledNext} shadow-sm" href="#" title="Siguiente">
                <i class="fas fa-chevron-right text-sm"></i>
            </a>
        `;
        btnNext.addEventListener('click', (e) => {
            e.preventDefault();
            if (paginaActual < totalPaginas) {
                paginaActual++;
                aplicarPaginacion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
        lista.appendChild(btnNext);
    }










    // 3. Al cargar la página, arrancamos el motor
    document.addEventListener('DOMContentLoaded', () => {
        renderizarTablas(mockDataFromAPI);
    });

   // ==========================================
    // FASE 3: MODAL INTELIGENTE (Descarga y Subida)
    // ==========================================
    window.handleBadgeClick = function(empresa, año, mes, proceso, status, fileUrl) {
        const modal = document.getElementById('wizardModal');
        const form = document.getElementById('wizardForm');
        const dynamicArea = document.getElementById('dynamicArea');
        const loader = document.getElementById('wizardLoader');
        const modalTitle = document.querySelector('#wizardModal .modal-header h3');

        // 1. Ocultamos el formulario manual porque ya sabemos qué eligió el usuario
        if(form) form.style.display = 'none';
        if(loader) loader.style.display = 'none';
        dynamicArea.style.display = 'block';

        // 2. Personalizamos el título del Modal
        modalTitle.innerHTML = `<i class="fas fa-file-invoice text-indigo-600"></i> ${proceso} - ${mes} ${año}`;

        // 3. Construimos la interfaz dependiendo del Estatus
        let htmlContent = `
            <div class="mb-5 p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 shadow-inner">
                <div class="flex justify-between items-center mb-2">
                    <span class="font-semibold text-slate-500">Empresa:</span>
                    <span class="font-bold">${empresa}</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="font-semibold text-slate-500">Estado Actual:</span>
                    <span class="font-bold ${status === 'Terminado' ? 'text-green-600' : status === 'En Proceso' ? 'text-yellow-600' : 'text-slate-500'}">
                        ${status}
                    </span>
                </div>
            </div>
        `;

        // Si ya hay un archivo, mostramos el botón de descargar
        if (status === 'Terminado' || status === 'En Proceso') {
            htmlContent += `
                <div class="mb-5">
                    <a href="${fileUrl || '#'}" target="_blank" class="btn btn-outline w-full flex justify-center text-indigo-600 border-indigo-200 hover:bg-indigo-50 transition-colors">
                        <i class="fas fa-download mr-2"></i> Descargar Reporte Actual
                    </a>
                </div>
                <div class="relative flex items-center py-2 mb-4">
                    <div class="flex-grow border-t border-slate-200"></div>
                    <span class="flex-shrink-0 mx-4 text-slate-400 text-xs uppercase tracking-wider">O actualizar archivo</span>
                    <div class="flex-grow border-t border-slate-200"></div>
                </div>
            `;
        }

        // El Dropzone para subir (ya sea nuevo o para reemplazar)
        htmlContent += `
            <label class="block text-sm font-semibold text-slate-700 mb-2">
                ${status === 'No iniciado' ? 'Subir Nuevo Reporte (PDF):' : 'Reemplazar con nuevo PDF:'}
            </label>
            
            <div class="file-drop-area border-2 border-dashed border-indigo-300 rounded-xl p-8 text-center bg-indigo-50/30 hover:bg-indigo-50 transition cursor-pointer group" id="dropAreaUI">
                <i class="fas fa-cloud-upload-alt text-4xl text-indigo-400 group-hover:text-indigo-600 transition-colors mb-3"></i>
                <p class="text-sm text-slate-600 font-medium" id="fileNameTextUI">Haz clic aquí para seleccionar tu archivo</p>
                <input type="file" id="fileInputUI" accept=".pdf" class="hidden">
            </div>

            <button id="btnFinalUploadUI" class="btn btn-primary w-full mt-5" style="display: none;">
                <i class="fas fa-upload"></i> Guardar en Base de Datos
            </button>
        `;

        dynamicArea.innerHTML = htmlContent;

        // 4. Lógica de selección de archivo
        const dropArea = document.getElementById('dropAreaUI');
        const fileInput = document.getElementById('fileInputUI');
        const fileNameText = document.getElementById('fileNameTextUI');
        const btnFinalUpload = document.getElementById('btnFinalUploadUI');

        dropArea.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && file.type === "application/pdf") {
                fileNameText.innerHTML = `<i class="fas fa-file-pdf text-red-500 mr-2"></i> ${file.name}`;
                fileNameText.className = "text-sm text-green-600 font-bold";
                btnFinalUpload.style.display = 'block'; // Mostramos el botón
            } else {
                alert("Error: Solo se permiten archivos PDF."); // Usa tu showNotification aquí si lo tienes importado
                fileInput.value = "";
                fileNameText.textContent = "Haz clic aquí para seleccionar tu archivo";
                fileNameText.className = "text-sm text-slate-600 font-medium";
                btnFinalUpload.style.display = 'none';
            }
        });

        // 5. Lógica de subida simulada
        btnFinalUpload.addEventListener('click', () => {
            btnFinalUpload.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Subiendo reporte...';
            btnFinalUpload.style.pointerEvents = 'none';
            btnFinalUpload.style.opacity = '0.7';

            setTimeout(() => {
                alert('¡Reporte guardado exitosamente!'); // Cambia esto por showNotification
                modal.classList.add('hidden');
                
                // AQUÍ: En el futuro, llamaríamos a renderizarTablas() de nuevo para que la celda se pinte de verde
            }, 1500);
        });

        // Abrimos el modal
        modal.classList.remove('hidden');
    };




        //este apartado es para mostrar normal el formulario de agregar status de reportes


        if(btnOpen) {
            btnOpen.addEventListener('click', () => {
                // Volvemos a mostrar el formulario manual y limpiamos lo dinámico
                const form = document.getElementById('wizardForm');
                const dynamicArea = document.getElementById('dynamicArea');
                const modalTitle = document.querySelector('#wizardModal .modal-header h3');

                form.style.display = 'block';
                dynamicArea.style.display = 'none';
                modalTitle.innerHTML = `<i class="fas fa-tasks"></i> Gestión de Reporte`;
                
                modal.classList.remove('hidden');
