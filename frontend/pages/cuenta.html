<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cuenta | ControlTask</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body data-page="cuenta">

    <main id="page-content">

        <div class="mb-8">
            <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Mi Perfil</h2>
            <p class="text-sm text-slate-500 mt-1">Gestiona tu información personal y la seguridad de tu sesión.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <div class="flex items-center gap-3 mb-6 pb-4 border-b border-slate-100">
                    <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold">
                        <i class="fas fa-id-badge"></i>
                    </div>
                    <div>
                        <h3 class="text-lg font-bold text-slate-800">Datos Personales</h3>
                        <p class="text-xs text-slate-500">Actualiza cómo te ves en el sistema</p>
                    </div>
                </div>

                <form id="profile-form">
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Nombre Completo</label>
                        <div class="relative">
                            <i class="fas fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                            <input type="text" id="profile-name" required class="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-300 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Correo Electrónico</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                            <input type="email" id="profile-email" required class="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-300 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>
                    </div>

                    <button type="submit" id="btnSaveProfile" class="btn btn-primary w-full flex justify-center items-center gap-2">
                        <i class="fas fa-save"></i> Guardar Cambios
                    </button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <div class="flex items-center gap-3 mb-6 pb-4 border-b border-slate-100">
                    <div class="w-10 h-10 rounded-full bg-orange-100 flex items-center justify-center text-orange-600 font-bold">
                        <i class="fas fa-lock"></i>
                    </div>
                    <div>
                        <h3 class="text-lg font-bold text-slate-800">Seguridad</h3>
                        <p class="text-xs text-slate-500">Asegúrate de usar una contraseña fuerte</p>
                    </div>
                </div>

                <form id="security-form">
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Contraseña Actual</label>
                        <div class="relative">
                            <i class="fas fa-key absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                            <input type="password" id="current-password" required placeholder="••••••••" class="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-300 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Nueva Contraseña</label>
                        <div class="relative">
                            <i class="fas fa-shield-alt absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                            <input type="password" id="new-password" required placeholder="••••••••" class="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-300 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Confirmar Nueva Contraseña</label>
                        <div class="relative">
                            <i class="fas fa-check-circle absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                            <input type="password" id="confirm-password" required placeholder="••••••••" class="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-300 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>
                    </div>

                    <button type="submit" id="btnSaveSecurity" class="btn border border-slate-300 text-slate-700 bg-slate-50 hover:bg-slate-100 w-full flex justify-center items-center gap-2 transition-colors">
                        <i class="fas fa-sync-alt"></i> Actualizar Contraseña
                    </button>
                </form>
            </div>

        </div>

        <div class="text-center mt-8">
            <button id="btnLogout" class="text-red-500 hover:text-red-700 font-semibold text-sm transition flex items-center justify-center gap-2 mx-auto">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión en este dispositivo
            </button>
        </div>

    </main>

    <script type="module" src="../js/layout.js"></script>
    
    <script type="module">
        import { showNotification } from '../js/noti.js';

        document.addEventListener("DOMContentLoaded", () => {
            
            // 1. Simular carga de datos actuales del usuario
            // En un entorno real, pedirías esto a tu API: API.getMyProfile();
            const mockUserData = {
                name: "Admin Carlos",
                email: "admin@controltask.com"
            };

            const inputName = document.getElementById('profile-name');
            const inputEmail = document.getElementById('profile-email');
            
            if(inputName) inputName.value = mockUserData.name;
            if(inputEmail) inputEmail.value = mockUserData.email;

            // 2. Evento: Guardar Datos Personales
            document.getElementById('profile-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const btn = document.getElementById('btnSaveProfile');
                const originalText = btn.innerHTML;
                
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';
                btn.disabled = true;

                setTimeout(() => {
                    showNotification('Datos personales actualizados', 'success');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }, 1000);
            });

            // 3. Evento: Actualizar Contraseña
            document.getElementById('security-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const currentPass = document.getElementById('current-password').value;
                const newPass = document.getElementById('new-password').value;
                const confirmPass = document.getElementById('confirm-password').value;

                if (newPass !== confirmPass) {
                    showNotification('Las contraseñas nuevas no coinciden', 'error');
                    return;
                }

                if (newPass.length < 6) {
                    showNotification('La contraseña debe tener al menos 6 caracteres', 'error');
                    return;
                }

                const btn = document.getElementById('btnSaveSecurity');
                const originalText = btn.innerHTML;
                
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando...';
                btn.disabled = true;

                setTimeout(() => {
                    // Limpiamos los campos después de éxito
                    document.getElementById('current-password').value = '';
                    document.getElementById('new-password').value = '';
                    document.getElementById('confirm-password').value = '';

                    showNotification('Tu contraseña ha sido actualizada', 'success');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }, 1500);
            });

            // 4. Evento: Cerrar Sesión
            document.getElementById('btnLogout').addEventListener('click', () => {
                if(confirm("¿Estás seguro de que deseas cerrar sesión?")) {
                    localStorage.removeItem('role'); // Limpiamos la memoria
                    showNotification('Cerrando sesión...', 'success');
                    setTimeout(() => {
                        window.location.href = "../index.html"; // Cambia esta ruta a tu login real
                    }, 1000);
                }
            });

        });
    </script>
</body>
</html>
