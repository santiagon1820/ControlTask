<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Usuario | ControlTask</title>

    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/panel.css">
    <link rel="stylesheet" href="../css/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css>
</head>
<body data-layout="dashboard" data-role="user" data-page="paneluser">

        <main id="page-content" class="content-area">
            <h2>Panel de Usuario</h2>

            <!-- Historial de Archivos -->
            <h3>Historial de Archivos Subidos</h3>
            <table id="files-table">
                <thead>
                    <tr>
                        <th>Nombre del Archivo</th>
                        <th>Fecha de Subida</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Las filas de archivos se llenarán dinámicamente -->
                </tbody>
            </table>

            <!-- Modal para actualizar archivo -->
            <div id="fileModal" class="modal-overlay hidden">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3><i class="fas fa-upload"></i> Actualizar Archivo</h3>
                        <button id="btnCloseFileModal" class="close-btn"><i class="fas fa-times"></i></button>
                    </div>
                    <form id="update-file-form">
                        <div class="input-group">
                            <label for="file-upload">Seleccionar Archivo</label>
                            <input type="file" id="file-upload" name="file" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Actualizar Archivo</button>
                    </form>
                </div>
            </div>
        </main>
    

    <script type="module" src="../js/noti.js"></script>
    <script type="module" src="../js/layout.js"></script>
    <script type="module" src="../js/views/paneluser.js"></script>
</body>
</html>
