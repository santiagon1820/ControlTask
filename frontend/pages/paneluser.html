<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Usuario | ControlTask</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/panel.css">
    <script type="module" src="../js/api.js"></script>
    <script type="module" src="../js/layout.js"></script>
</head>
<body>
    <div class="main-layout">
        <main class="content-area">
            <h2>Panel de Usuario</h2>

            <!-- Historial de Archivos -->
            <h3>Historial de Archivos Subidos</h3>
            <table id="files-table">
                <thead>
                    <tr>
                        <th>Nombre del Archivo</th>
                        <th>Fecha de Subida</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Las filas de archivos se llenarán dinámicamente -->
                </tbody>
            </table>

            <!-- Modal para actualizar archivo -->
            <div id="fileModal" class="modal-overlay hidden">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3><i class="fas fa-upload"></i> Actualizar Archivo</h3>
                        <button id="btnCloseFileModal" class="close-btn"><i class="fas fa-times"></i></button>
                    </div>
                    <form id="update-file-form">
                        <div class="input-group">
                            <label for="file-upload">Seleccionar Archivo</label>
                            <input type="file" id="file-upload" name="file" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Actualizar Archivo</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        // Función para cargar el historial de archivos de la empresa
        async function loadFiles() {
            const files = await API.getFiles(1); // Suponiendo que 1 es el ID de la empresa actual
            const tableBody = document.querySelector('#files-table tbody');
            tableBody.innerHTML = '';

            files.forEach(file => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${file.name}</td>
                    <td>${file.uploadDate}</td>
                    <td>
                        <button class="btn btn-outline" onclick="showUpdateFileModal(${file.id})">Actualizar</button>
                        <button class="btn btn-primary" onclick="downloadFile('${file.downloadUrl}')">Descargar</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        // Mostrar el modal para actualizar archivo
        function showUpdateFileModal(fileId) {
            document.getElementById('fileModal').classList.remove('hidden');
            // Rellenar el formulario con el archivo seleccionado (opcional)
            document.getElementById('update-file-form').onsubmit = async (event) => {
                event.preventDefault();
                await updateFile(fileId);
            };
        }

        // Función para actualizar archivo
        async function updateFile(fileId) {
            const file = document.getElementById('file-upload').files[0];
            try {
                await API.updateFile(fileId, file);
                showNotification('Archivo actualizado con éxito', 'success');
                loadFiles(); // Recargar historial de archivos
                closeFileModal();
            } catch (error) {
                showNotification('Error al actualizar el archivo', 'error');
            }
        }

        // Función para descargar el archivo
        function downloadFile(url) {
            window.location.href = url;  // Redirigir a la URL del archivo para la descarga
        }

        // Función para cerrar el modal
        document.getElementById('btnCloseFileModal').addEventListener('click', closeFileModal);

        function closeFileModal() {
            document.getElementById('fileModal').classList.add('hidden');
        }

        // Cargar historial de archivos al inicio
        loadFiles();
    </script>
</body>
</html>
