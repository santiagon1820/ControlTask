<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="/frontend/css/styles.css">
    <link rel="stylesheet" href="/frontend/css/loginyres.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-wrapper">
        <form class="auth-card">
            <h2>Bienvenido a Control Task</h2>
            <p>Por favor, ingresa tus credenciales</p>
            
            <div class="input-group">
                <input type="text" id="username" required>
                <label for="username">Usuario</label>
            </div>
            
            <div class="input-group password-group">
                
                <label for="password">Contraseña</label>

                <div class="password-wrapper">
                    <input type="password" id="password" required>
                    <i class="fas fa-eye" id="togglePassword"></i>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 80%; margin-top: 20px; border-radius: 50px;">
                Entrar
            </button>

            <div class="footer-links">
                <a href="/frontend/pages/login/restaurarcontraseña.html">¿Olvidaste tu contraseña?</a>
            </div>
        </form>
    </div>




    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');
    
        togglePassword.addEventListener('click', function () {
            // Cambiamos el tipo de dato: de 'password' (oculto) a 'text' (string visible)
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Cambiamos el icono del ojito (abierto/cerrado)
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>
    
    <script type="module">
        import API from '/js/api.js';
    
        document.querySelector('form').addEventListener('submit', async function(e) {
            e.preventDefault(); // Evita que el formulario se envíe de forma tradicional
    
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value; // Usamos el input ya existente en el HTML
    
            try {
                const loginData = await API.login(username, password); // Llamada a la función de login
                if (loginData && loginData.token) { // Agregué una validación extra de seguridad
                    localStorage.setItem('token', loginData.token); // Guarda el token en localStorage
                    window.location.href = '/pages/adminpanel.html'; // Redirige al panel de administración
                }
            } catch (error) {
                console.error("Error en el login:", error); // Buena práctica: imprimir el error en consola
                if (API.handleError) {
                    API.handleError(error); // Maneja cualquier error usando tu método
                }
            }
        });

                // En el bloque del script de login.html
        if (loginData.token) {
            localStorage.setItem('token', loginData.token);
            showNotification('Login exitoso', 'success'); // Muestra una notificación de éxito
            window.location.href = '/pages/adminpanel.html';
        } else {//hay que trabajar esta parte no muestra error
            showNotification('Credenciales incorrectas', 'error'); // Muestra una notificación de error
        }

    </script>

    


</body>
</html>
