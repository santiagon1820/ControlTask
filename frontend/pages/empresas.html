<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empresas | ControlTask</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/panel.css">
    <script type="module" src="../js/api.js"></script>
    <script type="module" src="../js/layout.js"></script>
</head>
<body>
    <div class="main-layout">
        <main class="content-area">
            <h2>Gestión de Empresas</h2>

            <!-- Botón de Agregar Empresa -->
            <button id="btnOpenWizard" class="btn btn-primary">
                Agregar Nueva Empresa
            </button>

            <!-- Tabla de Empresas -->
            <table id="companies-table">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Teléfono</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Las filas de empresas se llenarán dinámicamente -->
                </tbody>
            </table>
        </main>
    </div>

    <!-- Wizard / Modal para Agregar, Editar, Eliminar Empresas -->
    <div id="wizardModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-tasks"></i> Gestión de Empresa</h3>
                <button id="btnCloseWizard" class="close-btn"><i class="fas fa-times"></i></button>
            </div>

            <!-- Wizard Steps (Paso 1, 2, 3) -->
            <div id="wizardSteps">
                <!-- Paso 1: Agregar / Editar Empresa -->
                <div id="step1">
                    <h4>Información de la Empresa</h4>
                    <form id="company-form">
                        <div class="input-group">
                            <label for="company-name">Nombre de la Empresa</label>
                            <input type="text" id="company-name" name="company_name" required>
                        </div>
                        <div class="input-group">
                            <label for="company-email">Correo de la Empresa</label>
                            <input type="email" id="company-email" name="company_email" required>
                        </div>
                        <div class="input-group">
                            <label for="company-phone">Teléfono de la Empresa</label>
                            <input type="tel" id="company-phone" name="company_phone" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Siguiente</button>
                    </form>
                </div>

                <!-- Paso 2: Confirmar (solo en el caso de editar o eliminar) -->
                <div id="step2" style="display: none;">
                    <h4>¿Estás seguro?</h4>
                    <p>¿Quieres guardar los cambios o eliminar esta empresa?</p>
                    <button id="confirm-action" class="btn btn-primary">Confirmar</button>
                    <button id="cancel-action" class="btn btn-outline">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // Abrir el modal del wizard
        document.getElementById('btnOpenWizard').addEventListener('click', () => {
            showWizard('add'); // Mostrar wizard para agregar una empresa
        });

        // Cargar empresas al inicio
        async function loadCompanies() {
            const companies = await API.getCompanies();
            const tableBody = document.querySelector('#companies-table tbody');
            tableBody.innerHTML = '';

            companies.forEach(company => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${company.name}</td>
                    <td>${company.email}</td>
                    <td>${company.phone}</td>
                    <td>
                        <button class="btn btn-outline" onclick="showWizard('edit', ${company.id})">Editar</button>
                        <button class="btn btn-danger" onclick="showWizard('delete', ${company.id})">Eliminar</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        // Mostrar el wizard según la acción (agregar, editar, eliminar)
        function showWizard(action, companyId = null) {
            document.getElementById('wizardModal').classList.remove('hidden');
            document.getElementById('wizardSteps').style.display = 'block';

            if (action === 'add') {
                // Limpiar el formulario para agregar empresa
                document.getElementById('company-form').reset();
                document.getElementById('step2').style.display = 'none';
                document.getElementById('company-name').focus();
            } else if (action === 'edit') {
                // Cargar los datos de la empresa en el formulario
                loadCompanyData(companyId);
                document.getElementById('step2').style.display = 'none';
            } else if (action === 'delete') {
                // Mostrar confirmación para eliminar
                document.getElementById('step2').style.display = 'block';
                document.getElementById('confirm-action').onclick = () => deleteCompany(companyId);
            }
        }

        // Cargar los datos de la empresa en el formulario (para editar)
        async function loadCompanyData(companyId) {
            const company = await API.getCompanyById(companyId);
            document.getElementById('company-name').value = company.name;
            document.getElementById('company-email').value = company.email;
            document.getElementById('company-phone').value = company.phone;
            document.getElementById('company-form').onsubmit = async (e) => {
                e.preventDefault();
                await updateCompany(companyId);
            };
        }

        // Actualizar empresa
        async function updateCompany(companyId) {
            const name = document.getElementById('company-name').value;
            const email = document.getElementById('company-email').value;
            const phone = document.getElementById('company-phone').value;

            try {
                await API.editCompany(companyId, name, email, phone);
                showNotification('Empresa actualizada con éxito', 'success');
                loadCompanies();
                closeWizard();
            } catch (error) {
                showNotification('Error al actualizar la empresa', 'error');
            }
        }

        // Eliminar empresa
        async function deleteCompany(companyId) {
            try {
                await API.deleteCompany(companyId);
                showNotification('Empresa eliminada', 'success');
                loadCompanies();
                closeWizard();
            } catch (error) {
                showNotification('Error al eliminar la empresa', 'error');
            }
        }

        // Cerrar el wizard (modal)
        document.getElementById('btnCloseWizard').addEventListener('click', closeWizard);

        function closeWizard() {
            document.getElementById('wizardModal').classList.add('hidden');
        }

        // Cargar empresas al inicio
        loadCompanies();
    </script>
</body>
</html>
