<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administrador | ControlTask</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body data-role="admin" data-page="fisicas">


    <main id="page-content">

        <div class="flex flex-wrap justify-between items-center gap-4 mb-8 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div>
                <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Reportes de Personas Fisicas</h2>
                <p class="text-sm text-slate-500 mt-1">Consulta y gestiona los estados contables por año fiscal.</p>
            </div>
    
            <div class="flex items-center gap-4">
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="searchGeneral" placeholder="Buscar empresa o palabra..." class="pl-10 pr-4 py-2 w-64 rounded-full border border-slate-300 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>

                <div class="relative">
                    <button id="btnFilterYear" class="btn btn-outline w-10 h-10 rounded-full p-0 flex justify-center items-center" title="Filtrar por año">
                        <i class="fas fa-calendar-alt text-indigo-600"></i>
                    </button>
                    <div id="yearDropdown" class="hidden absolute top-12 right-0 bg-white border border-slate-200 shadow-xl rounded-xl p-2 z-50 w-36 flex flex-col gap-1">
                    </div>

                </div>
    
                
    
                <button id="btnOpenWizard" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Status de Reportes
                </button>
            </div>
        </div>

            <!--hay que corregir esto por un script de año mas reciente en la tabla y no una fija-->
        <div id="tables-container">
            
        </div>

       
        <!-- aqui es el nav bar de paginacion -->
        <nav id="pagination-container" aria-label="Paginación" class="flex justify-center mt-8 mb-4">
            <ul class="flex items-center gap-2" id="pagination-list">
                </ul>
        </nav> 


    </main>
    <!--este es el wizzard es para agregar nuevo status de reporte-->
    <div id="wizardModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="color: var(--primary-blue);"><i class="fas fa-tasks"></i> Gestión de Reporte</h3>
                <button id="btnCloseWizard" class="close-btn"><i class="fas fa-times"></i></button>
            </div>
            
            <form id="wizardForm">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                    <div>
                        <label style="font-weight: 600; font-size: 13px;">Año</label>
                        <!--SE MODIFICO ESTE APARTADO PARA ESCRIBIR EL AÑO Y NO SELECCIONARLO -->
                            <input type="number" id="selectYear" min="1980" max="2099" placeholder="Ej. 2026" required class="w-full">
                        
                    </div>
                    <div>
                        <label style="font-weight: 600; font-size: 13px;">Mes</label>
                        <select id="selectMonth" required>
                            <option value="Enero">Enero</option>
                            <option value="Febrero">Febrero</option>
                            <option value="Marzo">Marzo</option>
                            <option value="Abril">Abril</option>
                            <option value="Mayo">Mayo</option>
                            <option value="Junio">Junio</option>
                            <option value="Julio">Julio</option>
                            <option value="Agosto">Agosto</option>
                            <option value="Septiembre">Septiembre</option>
                            <option value="Octubre">Octubre</option>
                            <option value="Noviembre">Noviembre</option>
                            <option value="Diciembre">Diciembre</option>
                        </select>
                    </div>
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="font-weight: 600; font-size: 13px;">Empresa</label>
                    <select id="selectCompany" required>
                        <option value="" disabled selected>Seleccione la empresa...</option>
                        
                    </select>
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="font-weight: 600; font-size: 13px;">Proceso</label>
                    <select id="selectProcess" required class="w-full">
                        <option value="" disabled selected>Seleccione el proceso...</option>
                        <option value="DYP">DYP</option>
                        <option value="DIOT">DIOT</option>
                        <option value="CONT. ELEC.">Contabilidad Electrónica</option>
                        <option value="ISN">Impuesto sobre nomina (ISN)</option>
                        <option value="IMSS">IMSS</option>
                    </select>
                </div>

                <button type="submit" id="btnSubmitWizard" class="btn btn-primary" style="width: 100%;">
                    Siguiente <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div id="wizardLoader" class="loader-container">
                <div class="spinner"></div>
                <p style="color: var(--text-muted); font-weight: 600;">Consultando estado en el servidor...</p>
            </div>

            <div id="dynamicArea" class="dynamic-area"></div>
        </div>
    </div>

    <script type="module">
        // 1. Importamos tu sistema de notificaciones
        import { showNotification } from '../js/noti.js';

        // ==========================================
        // 2. DATOS Y CONFIGURACIÓN GLOBAL
        // ==========================================
        const mockDataFromAPI = [
            { company: "Empresa A", year: 2026, month: "Enero", process: "DYP", status: "Terminado", file_url: "link.pdf" },
            { company: "Empresa B", year: 2025, month: "Marzo", process: "ISN", status: "En Proceso", file_url: "" },
            { company: "Empresa A", year: 2024, month: "Febrero", process: "DIOT", status: "Terminado", file_url: "link.pdf" },
            { company: "Empresa B", year: 2023, month: "Abril", process: "IMSS", status: "Terminado", file_url: "link.pdf" },
            { company: "Empresa A", year: 2022, month: "Enero", process: "DYP", status: "Terminado", file_url: "link.pdf" }
        ];

        const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
        const procesos = ['DYP', 'DIOT', 'CONT. ELEC.', 'ISN', 'IMSS'];
        
        const tablasPorPagina = 1; // Muestra solo 1 año por página
        let paginaActual = 1;
        let filtroTexto = "";
        let filtroAno = "Todos";
        let seccionesVisibles = []; 

        // ==========================================
        // 3. ELEMENTOS DEL MODAL
        // ==========================================
        const modal = document.getElementById('wizardModal');
        const btnOpenWizard = document.getElementById('btnOpenWizard');
        const btnCloseWizard = document.getElementById('btnCloseWizard');
        const form = document.getElementById('wizardForm');
        const loader = document.getElementById('wizardLoader');
        const dynamicArea = document.getElementById('dynamicArea');
        const btnSubmitWizard = document.getElementById('btnSubmitWizard');
        const modalTitle = document.querySelector('#wizardModal .modal-header h3');

        // ==========================================
        // 4. MOTOR DE RENDERIZADO DINÁMICO
        // ==========================================
        function renderizarTablas(datos) {
            const container = document.getElementById('tables-container');
            if(!container) return;
            container.innerHTML = ''; 

            const añosUnicos = [...new Set(datos.map(d => d.year))].sort((a, b) => b - a);
            const empresasUnicas = [...new Set(datos.map(d => d.company))].sort();

            if(añosUnicos.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-500 py-10">No hay reportes registrados aún.</p>';
                return;
            }

            construirFiltroAños(añosUnicos);

            añosUnicos.forEach(año => {
                const wrapper = document.createElement('div');
                wrapper.className = "mb-10 table-year-section animate-fade-in"; 
                wrapper.dataset.year = año;
                
                wrapper.innerHTML = `
                    <div class="mb-4 flex justify-between items-center">
                        <h3 class="text-lg font-bold text-slate-800">Estado de Reportes Contables ${año}</h3>
                    </div>
                `;

                let thead1 = `<tr><th rowspan="2" class="text-left font-bold text-slate-700 uppercase tracking-wider p-4 sticky left-0 bg-slate-50 z-10 border-r border-slate-200 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]">EMPRESA</th>`;
                let thead2 = `<tr class="text-xs uppercase text-slate-500 font-semibold bg-white">`;

                meses.forEach(mes => {
                    thead1 += `<th colspan="5" class="border-l border-slate-300 p-2 font-bold text-slate-600 text-center">${mes}</th>`;
                    procesos.forEach(proc => {
                        const extraBorder = proc === 'DYP' ? 'border-l border-slate-300' : '';
                        thead2 += `<th class="${extraBorder} p-2">${proc}</th>`;
                    });
                });

                thead1 += `</tr>`;
                thead2 += `</tr>`;

                let tbody = `<tbody>`;

                empresasUnicas.forEach(empresa => {
                    tbody += `<tr class="fila-empresa hover:bg-slate-50 transition-colors border-b border-slate-100">
                        <td class="text-left font-semibold text-slate-800 p-4 sticky left-0 bg-white z-10 border-r border-slate-200 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] group-hover:bg-slate-50">${empresa}</td>`;

                    meses.forEach(mes => {
                        procesos.forEach(proc => {
                            const registro = datos.find(d => d.company === empresa && d.year === año && d.month === mes && d.process === proc);
                            const status = registro ? registro.status : "No iniciado";
                            const fileUrl = registro ? registro.file_url : "";

                            let badgeClass = status === "Terminado" ? "badge-success" : status === "En Proceso" ? "badge-warning" : "badge-neutral";
                            const extraBorder = proc === 'DYP' ? 'border-l border-slate-200' : '';

                            tbody += `<td class="${extraBorder} p-3 text-center">
                                        <span class="badge ${badgeClass} cursor-pointer hover:opacity-80 transition-opacity whitespace-nowrap shadow-sm"
                                              onclick="handleBadgeClick('${empresa}', ${año}, '${mes}', '${proc}', '${status}', '${fileUrl}')">
                                            ${status}
                                        </span>
                                      </td>`;
                        });
                    });
                    tbody += `</tr>`;
                });

                tbody += `</tbody>`;

                wrapper.innerHTML += `
                    <div class="table-container overflow-x-auto shadow-sm rounded-xl border border-slate-200 bg-white">
                        <table class="min-w-max w-full text-sm text-center border-collapse">
                            <thead class="bg-slate-50 border-b border-slate-200">${thead1}${thead2}</thead>
                            ${tbody}
                        </table>
                    </div>
                `;
                
                container.appendChild(wrapper);
            });

            ejecutarFiltros();
        }

        // ==========================================
        // 5. LÓGICA DEL FILTRO DOBLE (Buscador + Año)
        // ==========================================
        const searchInput = document.getElementById('searchGeneral');
        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                filtroTexto = e.target.value.toLowerCase().trim();
                paginaActual = 1; 
                ejecutarFiltros();
            });
        }

        function construirFiltroAños(años) {
            const dropdown = document.getElementById('yearDropdown');
            const btnCalendar = document.getElementById('btnFilterYear');
            if(!dropdown || !btnCalendar) return;

            let html = `<button class="text-left px-3 py-2 hover:bg-indigo-50 hover:text-indigo-600 rounded-lg text-sm text-slate-700 transition font-semibold w-full" data-year="Todos">Todos los años</button>`;
            años.forEach(a => {
                html += `<button class="text-left px-3 py-2 hover:bg-indigo-50 hover:text-indigo-600 rounded-lg text-sm text-slate-700 transition w-full" data-year="${a}">${a}</button>`;
            });
            dropdown.innerHTML = html;

            btnCalendar.addEventListener('click', (e) => {
                e.stopPropagation();
                dropdown.classList.toggle('hidden');
            });

            dropdown.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    filtroAno = e.target.dataset.year;
                    if (filtroAno === "Todos") {
                        btnCalendar.classList.remove('bg-indigo-50', 'border-indigo-400');
                        btnCalendar.innerHTML = '<i class="fas fa-calendar-alt text-indigo-600"></i>';
                    } else {
                        btnCalendar.classList.add('bg-indigo-50', 'border-indigo-400');
                        btnCalendar.innerHTML = `<span class="text-indigo-700 font-bold text-xs">${filtroAno}</span>`;
                    }
                    dropdown.classList.add('hidden');
                    paginaActual = 1; 
                    ejecutarFiltros();
                });
            });

            document.addEventListener('click', () => dropdown.classList.add('hidden'));
        }

        function ejecutarFiltros() {
            const todasLasSecciones = Array.from(document.querySelectorAll('.table-year-section'));
            seccionesVisibles = []; 

            todasLasSecciones.forEach(seccion => {
                const añoDeSeccion = seccion.dataset.year;
                if (filtroAno !== "Todos" && añoDeSeccion !== filtroAno) {
                    seccion.style.display = 'none';
                    return; 
                }

                const filas = seccion.querySelectorAll('tbody tr.fila-empresa');
                let tieneFilasVisibles = false;

                filas.forEach(fila => {
                    const textoFila = fila.innerText.toLowerCase();
                    if (filtroTexto === "" || textoFila.includes(filtroTexto)) {
                        fila.style.display = ''; 
                        tieneFilasVisibles = true;
                    } else {
                        fila.style.display = 'none'; 
                    }
                });

                if (tieneFilasVisibles) {
                    seccionesVisibles.push(seccion);
                } else {
                    seccion.style.display = 'none';
                }
            });
            aplicarPaginacion();
        }




        // ==========================================
        // LLENAR EL SELECT DE EMPRESAS DINÁMICAMENTE
        // ==========================================
        async function cargarEmpresasEnSelect() {
            const selectCompany = document.getElementById('selectCompany');
            if (!selectCompany) return;

            // 1. Aquí harías un fetch real a tu API:
            // const empresas = await API.getCompanies();
            
            // 2. Por ahora, simulamos la respuesta de tu base de datos:
            const empresasDesdeBD = [
                { id: 1, name: "Empresa A" },
                { id: 2, name: "Empresa B" },
                { id: 3, name: "Corporativo C" },
                { id: 4, name: "Logística D" }
            ];

            // 3. Recorremos la lista y creamos una opción por cada empresa
            empresasDesdeBD.forEach(empresa => {
                const option = document.createElement('option');
                option.value = empresa.name;
                option.textContent = empresa.name;
                selectCompany.appendChild(option);
            });
        }

        // ==========================================
        // 6. PAGINACIÓN INTELIGENTE
        // ==========================================
        function aplicarPaginacion() {
            const navPaginacion = document.getElementById('pagination-container');
            const totalPaginas = Math.ceil(seccionesVisibles.length / tablasPorPagina);

            if (totalPaginas <= 1 && navPaginacion) {
                navPaginacion.style.display = 'none';
            } else if (navPaginacion) {
                navPaginacion.style.display = 'flex';
            }

            const inicio = (paginaActual - 1) * tablasPorPagina;
            const fin = inicio + tablasPorPagina;

            document.querySelectorAll('.table-year-section').forEach(s => s.style.display = 'none');

            seccionesVisibles.forEach((seccion, index) => {
                if (index >= inicio && index < fin) seccion.style.display = 'block';
            });

            renderizarControlesPaginacion(totalPaginas);
        }

        function renderizarControlesPaginacion(totalPaginas) {
            const lista = document.getElementById('pagination-list');
            if (!lista) return;
            lista.innerHTML = '';

            const btnPrev = document.createElement('li');
            const disabledPrev = paginaActual === 1 ? 'opacity-50 cursor-not-allowed pointer-events-none' : 'hover:bg-slate-50 hover:text-indigo-600 transition';
            btnPrev.innerHTML = `<a class="flex items-center justify-center w-10 h-10 rounded-lg border border-slate-300 bg-white text-slate-500 ${disabledPrev} shadow-sm" href="#"><i class="fas fa-chevron-left text-sm"></i></a>`;
            btnPrev.addEventListener('click', (e) => { e.preventDefault(); if (paginaActual > 1) { paginaActual--; aplicarPaginacion(); window.scrollTo(0,0); } });
            lista.appendChild(btnPrev);

            for (let i = 1; i <= totalPaginas; i++) {
                const li = document.createElement('li');
                if (i === paginaActual) {
                    li.innerHTML = `<a href="#" class="flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold shadow-md">${i}</a>`;
                } else {
                    li.innerHTML = `<a href="#" class="flex items-center justify-center w-10 h-10 rounded-lg border border-slate-300 bg-white text-slate-600 hover:bg-slate-50 transition shadow-sm">${i}</a>`;
                    li.addEventListener('click', (e) => { e.preventDefault(); paginaActual = i; aplicarPaginacion(); window.scrollTo(0,0); });
                }
                lista.appendChild(li);
            }

            const btnNext = document.createElement('li');
            const disabledNext = paginaActual === totalPaginas ? 'opacity-50 cursor-not-allowed pointer-events-none' : 'hover:bg-slate-50 hover:text-indigo-600 transition';
            btnNext.innerHTML = `<a class="flex items-center justify-center w-10 h-10 rounded-lg border border-slate-300 bg-white text-slate-500 ${disabledNext} shadow-sm" href="#"><i class="fas fa-chevron-right text-sm"></i></a>`;
            btnNext.addEventListener('click', (e) => { e.preventDefault(); if (paginaActual < totalPaginas) { paginaActual++; aplicarPaginacion(); window.scrollTo(0,0); } });
            lista.appendChild(btnNext);
        }

        // ==========================================
        // 7. EVENTOS DEL MODAL GENERAL Y CIERRE
        // ==========================================
        function resetModal() {
            if(form) form.style.display = 'block';
            if(loader) loader.style.display = 'none';
            if(dynamicArea) dynamicArea.style.display = 'none';
            if(btnSubmitWizard) btnSubmitWizard.style.display = 'block';
            if(form) form.reset(); 
        }

        if(btnOpenWizard) {
            btnOpenWizard.addEventListener('click', () => {
                resetModal();
                if(modalTitle) modalTitle.innerHTML = `<i class="fas fa-tasks"></i> Gestión de Reporte`;
                modal.classList.remove('hidden');
            });
        }

        if(btnCloseWizard) {
            btnCloseWizard.addEventListener('click', () => modal.classList.add('hidden'));
        }

        modal.addEventListener('click', (event) => {
            if (event.target === modal) modal.classList.add('hidden');
        });

        // ==========================================
        // 8. LÓGICA DE SUBMIT DEL MODAL MANUAL (El Wizard)
        // ==========================================
        if(form) {
            form.addEventListener('submit', async (e) => {
                e.preventDefault(); 
                form.style.display = 'none';
                loader.style.display = 'block';
                
                setTimeout(() => {
                    loader.style.display = 'none';
                    dynamicArea.style.display = 'block';
                    
                    dynamicArea.innerHTML = `
                        <div style="background: rgba(79, 70, 229, 0.1); padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; color: var(--primary-blue);">
                            <i class="fas fa-info-circle"></i> Sube el archivo PDF correspondiente al periodo seleccionado.
                        </div>
                        <label style="font-weight: 600; font-size: 13px;">Subir Reporte (PDF):</label>
                        <div class="file-drop-area cursor-pointer transition-colors hover:bg-indigo-50 bg-indigo-50/30 border-2 border-dashed border-indigo-300 rounded-xl p-8 text-center" id="dropAreaManual">
                            <i class="fas fa-cloud-upload-alt text-4xl text-indigo-400 mb-3"></i>
                            <p class="text-sm text-slate-600 font-medium" id="fileNameTextManual">Haz clic para seleccionar tu archivo</p>
                            <input type="file" id="fileInputManual" accept=".pdf" class="hidden">
                        </div>
                        <button id="btnFinalUploadManual" class="btn btn-primary" style="width: 100%; margin-top: 15px; display: none;">
                            <i class="fas fa-upload"></i> Guardar Reporte
                        </button>
                    `;

                    const dropArea = document.getElementById('dropAreaManual');
                    const fileInput = document.getElementById('fileInputManual');
                    const fileNameText = document.getElementById('fileNameTextManual');
                    const btnFinalUpload = document.getElementById('btnFinalUploadManual');

                    dropArea.addEventListener('click', () => fileInput.click());

                    fileInput.addEventListener('change', (event) => {
                        const file = event.target.files[0];
                        if (file && file.type === "application/pdf") {
                            fileNameText.innerHTML = `<i class="fas fa-check text-green-500 mr-2"></i> ${file.name}`;
                            fileNameText.className = "text-sm text-green-600 font-bold";
                            btnFinalUpload.style.display = 'block'; 
                        } else {
                            showNotification("Por favor, selecciona un archivo PDF válido.", "error");
                            fileInput.value = ""; 
                            fileNameText.textContent = "Haz clic para seleccionar tu archivo";
                            fileNameText.className = "text-sm text-slate-600 font-medium";
                            btnFinalUpload.style.display = 'none'; 
                        }
                    });

                    btnFinalUpload.addEventListener('click', () => {
                        btnFinalUpload.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Subiendo...';
                        btnFinalUpload.style.opacity = '0.7';
                        btnFinalUpload.style.pointerEvents = 'none';

                        setTimeout(() => {
                            showNotification('¡Reporte guardado correctamente!', 'success');
                            modal.classList.add('hidden'); 
                        }, 1500);
                    });

                }, 1000); 
            });
        }

        // ==========================================
        // 9. MODAL INTELIGENTE (Historial y Cambios de Estatus)
        // ==========================================
        window.handleBadgeClick = function(empresa, año, mes, proceso, status, fileUrl) {
            // 1. Ocultar los elementos del formulario manual
            if(form) form.style.display = 'none';
            if(loader) loader.style.display = 'none';
            if(btnSubmitWizard) btnSubmitWizard.style.display = 'none';
            if(modalTitle) modalTitle.innerHTML = `<i class="fas fa-file-invoice text-indigo-600"></i> ${proceso} - ${mes} ${año}`;

            let htmlContent = `
                <div class="mb-5 p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 shadow-inner">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-semibold text-slate-500">Cliente:</span>
                        <span class="font-bold">${empresa}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="font-semibold text-slate-500">Estado Actual:</span>
                        <span class="font-bold ${status === 'Terminado' ? 'text-green-600' : status === 'En Proceso' ? 'text-yellow-600' : 'text-slate-500'}">${status}</span>
                    </div>
                </div>
            `;

            // ESCENARIO 1: EL REPORTE YA ESTÁ TERMINADO
            if (status === 'Terminado') {
                const mockHistorial = [
                    { fecha: "15/02/2026", usuario: "Admin Carlos", doc: "Acuse_Final_v2.pdf" },
                    { fecha: "10/02/2026", usuario: "Ana Gómez", doc: "Acuse_Borrador.pdf" }
                ];

                htmlContent += `
                    <div class="mb-5">
                        <a href="${fileUrl || '#'}" target="_blank" class="btn btn-outline w-full flex justify-center text-indigo-600 border-indigo-200 hover:bg-indigo-50 transition-colors">
                            <i class="fas fa-download mr-2"></i> Descargar Reporte Actual
                        </a>
                    </div>

                    <div class="mb-6">
                        <h4 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2"><i class="fas fa-history mr-1"></i> Historial de Subidas</h4>
                        <div class="bg-white border border-slate-200 rounded-lg overflow-hidden">
                            ${mockHistorial.map(h => `
                                <div class="flex justify-between items-center p-3 border-b border-slate-100 last:border-0 hover:bg-slate-50 transition">
                                    <div>
                                        <p class="text-xs font-semibold text-slate-800">${h.doc}</p>
                                        <p class="text-[10px] text-slate-500">${h.fecha} • Subido por: ${h.usuario}</p>
                                    </div>
                                    <a href="#" class="text-indigo-500 hover:text-indigo-700 p-2"><i class="fas fa-download"></i></a>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="relative flex items-center py-2 mb-4">
                        <div class="flex-grow border-t border-slate-200"></div>
                        <span class="flex-shrink-0 mx-4 text-slate-400 text-xs uppercase tracking-wider">Actualizar Reporte</span>
                        <div class="flex-grow border-t border-slate-200"></div>
                    </div>
                    
                    <div class="file-drop-area border-2 border-dashed border-indigo-300 rounded-xl p-6 text-center bg-indigo-50/30 hover:bg-indigo-50 cursor-pointer transition-colors group" id="dropAreaUI">
                        <i class="fas fa-cloud-upload-alt text-3xl text-indigo-400 group-hover:text-indigo-600 mb-2"></i>
                        <p class="text-xs text-slate-600 font-medium" id="fileNameTextUI">Seleccionar nuevo PDF</p>
                        <input type="file" id="fileInputUI" accept=".pdf" class="hidden">
                    </div>
                    <button id="btnFinalUploadUI" class="btn btn-primary w-full mt-4" style="display: none;">Guardar Actualización</button>
                `;
            } 
            // ESCENARIO 2: EL REPORTE ESTÁ EN PROCESO
            else if (status === 'En Proceso') {
                htmlContent += `
                    <div class="text-center mb-6 mt-2">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-100 text-indigo-500 mb-4">
                            <i class="fas fa-upload text-3xl"></i>
                        </div>
                        <h4 class="font-bold text-slate-800 text-lg">Finalizar Reporte</h4>
                        <p class="text-sm text-slate-500 mt-1">Sube el PDF definitivo para cerrar este proceso.</p>
                    </div>

                    <div class="file-drop-area border-2 border-dashed border-indigo-300 rounded-xl p-6 text-center bg-indigo-50/30 hover:bg-indigo-50 cursor-pointer transition-colors group" id="dropAreaUI">
                        <i class="fas fa-file-pdf text-3xl text-indigo-400 group-hover:text-indigo-600 mb-2"></i>
                        <p class="text-xs text-slate-600 font-medium" id="fileNameTextUI">Seleccionar PDF final</p>
                        <input type="file" id="fileInputUI" accept=".pdf" class="hidden">
                    </div>
                    <button id="btnFinalUploadUI" class="btn btn-success w-full mt-4" style="display: none;">
                        <i class="fas fa-check-circle mr-1"></i> Guardar y marcar como "Terminado"
                    </button>
                `;
            }
            // ESCENARIO 3: NO INICIADO
            else {
                htmlContent += `
                    <div class="text-center mb-6 mt-2">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-yellow-100 text-yellow-500 mb-4">
                            <i class="fas fa-question text-3xl"></i>
                        </div>
                        <h4 class="font-bold text-slate-800 text-lg">¿Actualizar el estado del reporte?</h4>
                        <p class="text-sm text-slate-500 mt-1">Selecciona una acción para continuar.</p>
                    </div>

                    <button id="btnMarcarProceso" class="btn btn-outline w-full mb-4 border-yellow-400 text-yellow-600 hover:bg-yellow-50">
                        <i class="fas fa-clock mr-2"></i> Marcar como "En Proceso" (Sin archivo)
                    </button>
                    
                    <div class="relative flex items-center py-2 mb-4">
                        <div class="flex-grow border-t border-slate-200"></div>
                        <span class="flex-shrink-0 mx-4 text-slate-400 text-xs uppercase tracking-wider">O subir documento final</span>
                        <div class="flex-grow border-t border-slate-200"></div>
                    </div>

                    <div class="file-drop-area border-2 border-dashed border-indigo-300 rounded-xl p-6 text-center bg-indigo-50/30 hover:bg-indigo-50 cursor-pointer transition-colors group" id="dropAreaUI">
                        <i class="fas fa-file-pdf text-3xl text-indigo-400 group-hover:text-indigo-600 mb-2"></i>
                        <p class="text-xs text-slate-600 font-medium" id="fileNameTextUI">Seleccionar PDF final</p>
                        <input type="file" id="fileInputUI" accept=".pdf" class="hidden">
                    </div>
                    <button id="btnFinalUploadUI" class="btn btn-success w-full mt-4" style="display: none;">
                        <i class="fas fa-check-circle mr-1"></i> Guardar y marcar como "Terminado"
                    </button>
                `;
            }

            dynamicArea.innerHTML = htmlContent;
            dynamicArea.style.display = 'block';

            // ... (AQUÍ DEBES DEJAR LOS EVENTOS DE BOTONES INYECTADOS QUE YA TENÍAS: btnMarcarProceso y btnFinalUploadUI) ...

            dynamicArea.innerHTML = htmlContent;
            dynamicArea.style.display = 'block';

            // EVENTOS DE BOTONES INYECTADOS
            
            // Lógica para marcar en Proceso
            const btnProceso = document.getElementById('btnMarcarProceso');
            if (btnProceso) {
                btnProceso.addEventListener('click', function() {
                    this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Actualizando...';
                    setTimeout(() => {
                        showNotification('El reporte ahora está "En Proceso"', 'success');
                        modal.classList.add('hidden');
                    }, 1000);
                });
            }

            // Lógica de subir archivo
            const dropAreaUI = document.getElementById('dropAreaUI');
            if (dropAreaUI) {
                dropAreaUI.addEventListener('click', () => document.getElementById('fileInputUI').click());
                
                document.getElementById('fileInputUI').addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file && file.type === "application/pdf") {
                        document.getElementById('fileNameTextUI').innerHTML = `<i class="fas fa-check text-green-500 mr-2"></i> ${file.name}`;
                        document.getElementById('fileNameTextUI').className = "text-xs text-green-600 font-bold";
                        document.getElementById('btnFinalUploadUI').style.display = 'block';
                    } else {
                        // AQUÍ USAMOS TU NOTIFICACIÓN DE ERROR
                        showNotification("Solo se permiten archivos PDF.", "error");
                        document.getElementById('fileInputUI').value = "";
                        document.getElementById('fileNameTextUI').textContent = "Seleccionar PDF final";
                        document.getElementById('fileNameTextUI').className = "text-xs text-slate-600 font-medium";
                        document.getElementById('btnFinalUploadUI').style.display = 'none';
                    }
                });

                document.getElementById('btnFinalUploadUI').addEventListener('click', function() {
                    this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Subiendo al servidor...';
                    this.style.pointerEvents = 'none';
                    setTimeout(() => {
                        // AQUÍ USAMOS TU NOTIFICACIÓN DE ÉXITO
                        showNotification('¡PDF guardado y reporte actualizado!', 'success');
                        modal.classList.add('hidden');
                    }, 1500);
                });
            }

            modal.classList.remove('hidden');
        };

        // ==========================================
        // 10. INICIALIZAR AL CARGAR
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {

            // 1. Averiguamos quién entró
        const userRole = localStorage.getItem("role") || "user";

        // 2. Buscamos los botones que son solo para el jefe
        const btnOpenWizard = document.getElementById('btnOpenWizard'); // El botón de + Status

        // 3. Si NO es admin, lo desaparecemos de la pantalla
        if (userRole !== 'admin' && btnOpenWizard) {
        btnOpenWizard.style.display = 'none';
        }


            renderizarTablas(mockDataFromAPI);
            cargarEmpresasEnSelect(); // <--- ESTA LINEA ES PARA SELECCIONAR LAS EMPRESAS EN ANADIR STATUS DE REPORTES
        });
    </script>
    
    <script type="module" src="../js/layout.js"></script>
    <script type="module" src="../js/filtros.js"></script>


</body>
</html>
