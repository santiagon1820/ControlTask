<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="/ControlTask/styles.css">
    <link rel="stylesheet" href="/ControlTask/login/loginyres.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-wrapper">
        <form class="auth-card">
            <h2>Bienvenido a Control Task</h2>
            <p>Por favor, ingresa tus credenciales</p>
            
            <div class="input-group">
                <input type="text" id="username" required>
                <label for="username">Usuario</label>
            </div>
            
            <div class="input-group password-group">
                
                <label for="password">Contraseña</label>

                <div class="password-wrapper">
                    <input type="password" id="password" required>
                    <i class="fas fa-eye" id="togglePassword"></i>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 80%; margin-top: 20px; border-radius: 50px;">
                Entrar
            </button>

            <div class="footer-links">
                <a href="/ControlTask/login/restaurarcontraseña.html">¿Olvidaste tu contraseña?</a>
            </div>
        </form>
    </div>
    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');

        togglePassword.addEventListener('click', function () {
            // Cambiamos el tipo de dato: de 'password' (oculto) a 'text' (string visible)
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Cambiamos el icono del ojito (abierto/cerrado)
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
